name: Infracost cost estimate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: Cost estimate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate base cost estimate
        run: |
          infracost breakdown \
            --path=terraform \
            --format=json \
            --out-file=/tmp/infracost-base.json \
            --terraform-var="alert_email=placeholder@example.com"

      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Generate PR cost estimate
        run: |
          infracost breakdown \
            --path=terraform \
            --format=json \
            --out-file=/tmp/infracost-pr.json \
            --terraform-var="alert_email=placeholder@example.com"

      - name: Post cost diff to PR
        run: |
          infracost diff \
            --path=/tmp/infracost-pr.json \
            --compare-to=/tmp/infracost-base.json \
            --format=json \
            --out-file=/tmp/infracost-diff.json

          infracost comment github \
            --path=/tmp/infracost-diff.json \
            --repo=$GITHUB_REPOSITORY \
            --github-token=${{ secrets.GITHUB_TOKEN }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update
